<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - IFTA Wizard</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="X-UA-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="stylesheet" href="dashboard.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="task-manager-layout">
        <!-- Header -->
        <header class="task-manager-header">
            <div class="task-manager-header-content">
                <div class="task-manager-title-section">
                    <a href="dashboard.html" class="btn btn-sm btn-secondary" style="display:inline-flex;align-items:center;gap:0.35rem;margin-right:0.75rem;text-decoration:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
                        Dashboard
                    </a>
                    <h1 id="pageTitle">Task Manager</h1>
                    <p class="task-manager-subtitle">Manage tasks across drivers, trucks, and trailers</p>
                </div>
                <div class="task-manager-actions">
                    <div class="task-view-toggle">
                        <button class="toggle-btn active" data-view="table" title="Table view">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="13" x2="21" y2="13"/><line x1="3" y1="19" x2="21" y2="19"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/>
                            </svg>
                            <span>Table</span>
                        </button>
                        <button class="toggle-btn" data-view="kanban" title="Kanban view">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <rect x="3" y="3" width="4" height="18"/><rect x="10" y="3" width="4" height="10"/><rect x="17" y="3" width="4" height="6"/>
                            </svg>
                            <span>Kanban</span>
                        </button>
                    </div>
                    <button class="btn btn-primary" id="addTaskBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        Add Task
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="task-manager-filters">
                <div class="filter-group">
                    <label for="statusFilter">Status:</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="assigneeFilter">Assigned to:</label>
                    <select id="assigneeFilter" class="filter-select">
                        <option value="">Everyone</option>
                        <option value="me">Me</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="entityTypeFilter">Entity:</label>
                    <select id="entityTypeFilter" class="filter-select">
                        <option value="">All</option>
                        <option value="drivers">Drivers</option>
                        <option value="trucks">Trucks</option>
                        <option value="trailers">Trailers</option>
                    </select>
                </div>
                <div class="filter-group search">
                    <input type="text" id="taskSearch" class="filter-input" placeholder="Search tasks...">
                </div>
                <button class="btn btn-sm btn-secondary" id="filterToggleButton">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
                    Resolved
                </button>
            </div>
        </header>

        <!-- Kanban View -->
        <div class="task-view-container task-view-kanban">
            <div class="kanban-board" id="kanbanBoard">
                <!-- Columns populated by JavaScript -->
            </div>
        </div>

        <!-- Table View -->
        <div class="task-view-container task-view-table active">
            <div class="task-table-wrapper">
                <table class="task-table" id="taskTable">
                    <thead>
                        <tr>
                            <th class="th-created">Created</th>
                            <th class="th-due-date">Due Date</th>
                            <th class="th-days">Days</th>
                            <th class="th-note">Note</th>
                            <th class="th-owner">Owner</th>
                            <th class="th-assigned">Assigned To</th>
                            <th class="th-type">Type</th>
                            <th class="th-status">Status</th>
                            <th class="th-comments">Comments</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
                <div id="taskTableEmpty" class="empty-state" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48">
                        <circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M9.64 18.04c.2.33.56.52.95.52.39 0 .75-.19.95-.52"/>
                    </svg>
                    <h3>No tasks found</h3>
                    <p>Create a new task or adjust your filters to get started</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal modal-task-form" id="taskFormModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="taskFormTitle">Add Task</h2>
                <button class="modal-close" id="closeTaskFormModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="taskForm" class="task-form">
                <div class="form-field">
                    <label for="taskEntityType">Entity Type *</label>
                    <select id="taskEntityType" class="form-select" required>
                        <option value="">Select...</option>
                        <option value="drivers">Driver</option>
                        <option value="trucks">Truck</option>
                        <option value="trailers">Trailer</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="taskEntityId">Entity *</label>
                    <select id="taskEntityId" class="form-select" required>
                        <option value="">Select an entity...</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="taskText">Task Description *</label>
                    <textarea id="taskText" class="form-textarea" rows="4" placeholder="Describe the task..." required></textarea>
                </div>

                <div class="form-field">
                    <label for="taskType">Task Type</label>
                    <select id="taskType" class="form-select">
                        <option value="">None</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="safety">Safety</option>
                        <option value="training">Training</option>
                        <option value="incident">Incident</option>
                        <option value="general">General</option>
                        <option value="inspection">Inspection</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="taskAssignees">Assign To</label>
                    <input type="text" id="taskAssignees" class="form-input" placeholder="Enter emails separated by commas">
                </div>

                <div class="form-field">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate" class="form-input">
                </div>

                <div class="form-field">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus" class="form-select">
                        <option value="Open">Open</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Task</button>
                    <button type="button" class="btn btn-secondary" id="cancelTaskForm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Detail Drawer -->
    <div class="drawer drawer-task-detail" id="taskDetailDrawer">
        <div class="drawer-content">
            <div class="drawer-header">
                <h2>Task Details</h2>
                <button class="drawer-close" id="closeTaskDetail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="drawer-body" id="taskDetailContent">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Resolution Modal -->
    <div class="modal modal-resolution" id="resolutionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Mark Task as Resolved</h2>
                <button class="modal-close" id="closeResolutionModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="resolutionForm" class="resolution-form">
                <div class="form-field">
                    <label for="resolutionNotes">Resolution Notes (Optional)</label>
                    <textarea id="resolutionNotes" class="form-textarea" rows="4" placeholder="Add notes about how this task was resolved..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Mark Resolved</button>
                    <button type="button" class="btn btn-secondary" id="cancelResolution">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="firebase-config.js?v=4"></script>
    <script src="task-manager.js?v=2"></script>
</body>
</html>
